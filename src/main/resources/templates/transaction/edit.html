<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <meta charset="UTF-8">
    <title>Transaction Edit</title>
    <link rel="stylesheet" th:href="@{/css/transaction/edit.css}">
    <script th:src="@{/js/transaction/create.js}"></script>
</head>
<body>
    <th:block layout:fragment="content">
      <form th:action="@{|/transaction/${updateRequestDto.id}/edit|}" method="post" class="transaction-edit-container">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div class="type-box">
              <label for="type">거래 유형
                  <select id="type">
                      <option th:each="type : ${types}"
                              th:value="${type}"
                              th:text="${type.displayName}">
                      </option>
                  </select>
              </label>
          </div>

          <div class="detail-box">
              <label for="detail"> 지출내용
                  <input type="text" name="detail" id="detail" th:value="${updateRequestDto.detail}">
              </label>
          </div>

          <div class="category-box">
              <label for="category"> 카테고리
                  <select name="transactionCategory" id="category">
                      <option th:each="category : ${categories}"
                              th:value="${category}"
                              th:text="${category.displayName}"
                              th:selected="${category == updateRequestDto.transactionCategory}">
                      </option>
                  </select>
              </label>
          </div>

          <div class="amount-box">
              <label for="amount"> 금액
                  <input type="text" name="amount" id="amount"
                         th:value="${updateRequestDto.amount}">
              </label>
          </div>

          <div class="date-box">
              <label for="transactionDate"> 날짜
                  <input type="date" name="transactionDate" id="transactionDate"
                         th:value="${updateRequestDto.transactionDate}">
              </label>
          </div>

          <button type="submit" class="edit-btn">수정</button>
      </form>
    </th:block>
</body>
</html>
