<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calendar Page</title>

    <link rel="stylesheet" th:href="@{/css/couple/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/couple/calendar.css}">

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">Two-Gether</div>

        <nav class="nav">
            <a th:href="@{/couple}">홈</a>
            <a th:href="@{/calendar}">캘린더</a>
            <a th:href="@{/record}">기록</a>
            <a th:href="@{/expense}">비용</a>
            <a th:href="@{/statistics}">통계</a>
        </nav>

        <div class="profile">
            <a th:href="@{/mypage}" class="profile-link">
            <span class="nickname">
                <span th:text="${member.name}">현선</span> 님
            </span>
                <img th:src="@{/images/default-profile.png}" alt="프로필 이미지">
            </a>
        </div>
    </header>

    <main class="calendar-container">
        <section class="calendar-layout">

            <div class="calendar-card">
                <div id="calendar"></div>
            </div>

            <aside class="schedule-panel">
                <h3>선택한 날짜 일정</h3>

                <div class="selected-date" id="selectedDate"></div>

                <div class="schedule-list" id="scheduleList">
                    <p class="empty-text">등록된 일정이 없습니다.</p>
                </div>

                <button type="button"
                        id="openModalBtn"
                        class="add-schedule-btn">
                    + 일정 추가
                </button>
            </aside>
        </section>
    </main>

    <div id="scheduleModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">일정 추가</h3>
                <button type="button" id="closeModalBtn" class="modal-close-btn">×</button>
            </div>

            <form id="scheduleForm" th:action="@{/calendar}" method="post">
                <div class="form-group">
                    <label for="scheduleDateInput">날짜</label>
                    <input type="date"
                           id="scheduleDateInput"
                           name="scheduleDate"
                           required>
                </div>

                <div class="form-group">
                    <label for="title">일정</label>
                    <input type="text"
                           id="title"
                           name="title"
                           placeholder="예: 비빔밥 먹기"
                           required>
                </div>

                <div class="form-group">
                    <label for="memo">메모</label>
                    <textarea id="memo"
                              name="memo"
                              placeholder="메모를 입력하세요"></textarea>
                </div>

                <label class="time-toggle">
                    <input type="checkbox" id="useTimeCheckbox">
                    시간 설정하기
                </label>

                <div id="timeFields" class="time-fields hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="startTime">시작 시간</label>
                            <input type="time" id="startTime" name="startTime">
                        </div>

                        <div class="form-group">
                            <label for="endTime">종료 시간</label>
                            <input type="time" id="endTime" name="endTime">
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelModalBtn" class="cancel-btn">취소</button>
                    <button type="submit" class="submit-btn">저장</button>
                </div>
            </form>

            <form id="deleteForm" method="post" class="delete-form">
                <button type="submit" id="deleteBtn" class="delete-btn">
                    일정 삭제
                </button>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const schedules = /*[[${schedules}]]*/ [];
    </script>

    <script th:src="@{/js/couple/calendar.js}"></script>
</body>
</html>
