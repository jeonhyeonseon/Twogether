<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Page</title>

    <link rel="stylesheet" th:href="@{/css/couple/dashboard.css}">
</head>
<body>

<header class="header">
    <div class="logo">Two-Gether</div>

    <nav class="nav">
        <a th:href="@{/couple}">홈</a>
        <a th:href="@{/calendar}">캘린더</a>
        <a th:href="@{/record}">기록</a>
        <a th:href="@{/expense}">비용</a>
        <a th:href="@{/statistics}">통계</a>
    </nav>

    <div class="profile">
        <a th:href="@{/mypage}" class="profile-link">
            <span class="nickname">
                <span th:text="${member.name}">현선</span> 님
            </span>

            <img th:src="@{/images/default-profile.png}" alt="프로필 이미지">
        </a>
    </div>
</header>

<main class="dashboard-container">

    <section class="top-section">

        <div class="card couple-card">

            <a th:href="@{/couple/edit}" class="edit-btn">[정보 수정]</a>

            <div class="couple-profile">
                <div class="profile-item">
                    <img class="couple-profile-img"
                         th:src="${dashboard.displayMyProfileImageUrl}"
                         alt="내 커플 프로필">

                    <span th:text="${dashboard.displayMyName}">
                        나
                    </span>
                </div>

                <span class="heart">♥</span>

                <div class="profile-item">
                    <img class="couple-profile-img"
                         th:src="${dashboard.displayPartnerProfileImageUrl}"
                         alt="상대 커플 프로필">

                    <span th:text="${dashboard.displayPartnerName}">
                        상대
                    </span>
                </div>
            </div>

            <div class="couple-info">

                <p class="day-text">함께한 지</p>
                <h2 th:if="${dashboard.hasStartDate}"
                    th:text="'D+' + ${dashboard.dDay}">
                    D+325
                </h2>

                <h2 th:unless="${dashboard.hasStartDate}">
                    D-Day
                </h2>

                <p class="start-date"
                    th:if="${dashboard.hasStartDate}"
                    th:text="${#temporals.format(dashboard.startDate, 'yyyy.MM.dd')} + '부터'">
                    2024.08.31부터
                </p>

                <p class="start-date"
                    th:unless="${dashboard.hasStartDate}">
                    시작일을 설정해주세요.
                </p>
            </div>
        </div>

        <div class="card schedule-card">
            <h3>다가오는 일정</h3>

            <div th:if="${#lists.isEmpty(dashboard.upcomingSchedules)}">
                <p class="empty-text">다가오는 일정이 없습니다.</p>
            </div>

            <div th:each="schedule : ${dashboard.upcomingSchedules}" class="schedule-item">

                <span th:text="${#temporals.format(schedule.scheduleDate, 'M.d')} + ' (' + ${#temporals.dayOfWeekNameShort(schedule.scheduleDate)} + ')'">
                    6.15 (월)
                </span>

                <span th:text="${schedule.title}">
                    일정 제목
                </span>

            </div>

            <a th:href="@{/calendar}" class="detail-btn">
                전체 일정 보기
            </a>
        </div>

    </section>

    <section class="bottom-section">

        <div class="card expense-card">
            <h3>이번 달 데이트 비용</h3>

            <h2 th:text="${#numbers.formatInteger(dashboard.monthlyTotalAmount, 1, 'COMMA')} + '원'">
                182,000원
            </h2>

            <p th:text="'데이트 ' + ${dashboard.monthlyDateCount} + '회'">
                데이트 4회
            </p>

            <div class="chart-placeholder">

                <div class="chart-bar-item"
                     th:each="chart : ${dashboard.monthlyExpenseCharts}">

                    <div class="bar"
                         th:style="'height:' + ${chart.heightPercent} + '%'"
                         th:title="${chart.monthLabel} + ' 지출: ' + ${#numbers.formatInteger(chart.amount, 1, 'COMMA')} + '원'">
                    </div>

                    <span th:text="${chart.monthLabel}">6월</span>

                </div>

            </div>

            <a th:href="@{/expense}" class="detail-btn">상세 보기</a>
        </div>

        <div class="card record-card">
            <h3>최근 데이트 기록</h3>

            <div th:if="${#lists.isEmpty(dashboard.recentRecords)}">
                <p class="empty-text">등록된 데이트 기록이 없습니다.</p>
            </div>

            <a th:each="record : ${dashboard.recentRecords}"
               th:href="@{/record/{recordId}(recordId=${record.id})}"
               class="record-item">

                <div class="record-image">
                    <img th:src="${record.thumbnailImageUrl}"
                         alt="데이트 사진">
                </div>

                <div>
                    <strong th:text="${record.title}">
                        한강 피크닉
                    </strong>

                    <p th:text="${#temporals.format(record.dateRecordDate, 'yyyy.MM.dd')}">
                        2026.06.22
                    </p>
                </div>
            </a>

            <a th:href="@{/record}" class="detail-btn">
                전체 기록 보기
            </a>
        </div>

        <div class="card stats-card">
            <h3>이번 달 한눈에 보기</h3>

            <div class="stats-item">
                <span>총 지출</span>
                <strong>182,000원</strong>
            </div>

            <div class="stats-item">
                <span>평균 지출</span>
                <strong>45,500원</strong>
            </div>

            <div class="stats-item">
                <span>데이트 횟수</span>
                <strong>4회</strong>
            </div>

            <button class="detail-btn">통계 보기</button>
        </div>

    </section>

</main>

</body>
</html>
