<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Couple Connect Page</title>

    <link rel="stylesheet" th:href="@{/css/couple/connect.css}">
</head>
<body>

    <header class="header">
        <div>Two-Gether</div>
    </header>

    <main class="invite-code-container">

        <div class="invite-text">
            <h2>파트너를 초대해보세요.</h2>

            <p>초대 코드를 공유하여 연결할 수 있어요</p>
        </div>

        <section class="invite-code-box">
            <h2>초대 코드</h2>

            <div class="invite-code" th:text="${inviteCode}">
                ABCD1234
            </div>

            <button type="submit" class="copy-btn">
                코드 복사
            </button>

            <div class="line"></div>

            <h3>코드를 공유해보세요!</h3>

            <div class="share-icon">
                
                <button type="submit" class="share-btn">
                    <img th:src="@{/images/kakao.png}" alt="카카오톡">
                </button>
                
                <button type="submit" class="share-btn">
                    <img th:src="@{/images/qr-code.png}" alt="QR코드">
                </button>
                
                <button type="submit" class="share-btn">
                    <img th:src="@{/images/email.png}" alt="이메일">
                </button>
            </div>
        </section>
    </main>
</body>
</html>
