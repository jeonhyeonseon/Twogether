<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Date Page</title>

    <link rel="stylesheet" th:href="@{/css/record/detail.css}">
</head>
<body>
    <header class="header">
        <div class="logo">Two-Gether</div>

        <nav class="nav">
            <a href="/couple">홈</a>
            <a href="/calendar">캘린더</a>
            <a href="/record" class="active">기록</a>
            <a href="/expense">비용</a>
            <a href="/statistics">통계</a>
        </nav>

        <div class="profile">
            <a th:href="@{/mypage}" class="profile-link">
            <span class="nickname">
                <span th:text="${member.name}">현선</span> 님
            </span>

                <img th:src="@{/images/default-profile.png}" alt="프로필 이미지">
            </a>
        </div>
    </header>

    <main class="record-detail-page">

        <div class="back-area">
            <a th:href="@{/record}" class="back-link">← 목록으로</a>
        </div>

        <section class="record-detail-container">

            <div class="photo-section">

                <div class="main-photo">
                    <img id="mainImage"
                         th:if="${!#lists.isEmpty(record.images)}"
                         th:src="${record.images[0].imageUrl}"
                         alt="데이트 사진">

                    <div th:if="${#lists.isEmpty(record.images)}" class="empty-photo">
                        사진이 없습니다.
                    </div>
                </div>

                <div class="thumbnail-list">
                    <div class="thumbnail" th:each="image : ${record.images}">
                        <img th:src="${image.imageUrl}"
                             class="thumbnail-image"
                             alt="데이트 사진">
                    </div>

                    <form th:action="@{/record/{recordId}/images(recordId=${record.id})}"
                          method="post"
                          enctype="multipart/form-data"
                          class="add-image-form">

                        <label for="detailImages" class="add-photo-btn">+</label>

                        <input type="file"
                               id="detailImages"
                               name="images"
                               accept="image/*"
                               multiple
                               hidden
                               onchange="this.form.submit()">
                    </form>
                </div>
            </div>

            <div class="info-section">

                <h1 class="record-title" th:text="${record.title}">
                    한강 피크닉
                </h1>

                <p class="record-date"
                   th:text="${#temporals.format(record.dateRecordDate, 'yyyy.MM.dd')}">
                    2024.05.10
                </p>

                <p class="record-memo"
                   th:text="${record.memo}">
                    날씨도 좋고 음식도 맛있었던 행복한 하루!
                </p>

                <div class="divider"></div>

                <div class="expense-summary">
                    <div class="expense-header">
                        <strong>관련 비용</strong>

                        <strong th:if="${!#lists.isEmpty(record.expenses)}"
                                th:text="'총 ' + ${#numbers.formatInteger(record.totalExpenseAmount, 1, 'COMMA')} + '원'">
                            총 42,000원
                        </strong>
                    </div>

                    <div th:if="${#lists.isEmpty(record.expenses)}"
                         class="empty-expense-box">
                        <p>등록된 관련 비용이 없습니다.</p>

                        <a th:href="@{/expense(recordId=${record.id})}"
                           class="connect-expense-btn">
                            비용 연결하기
                        </a>
                    </div>

                    <ul th:if="${!#lists.isEmpty(record.expenses)}"
                        class="expense-list">

                        <li th:each="expense : ${record.expenses}">
                            <span th:text="${expense.content}">
                                피크닉 도시락
                            </span>

                            <span th:text="${#numbers.formatInteger(expense.amount, 1, 'COMMA')} + '원'">
                                22,000원
                            </span>
                        </li>

                    </ul>
                </div>

                <div class="button-area">
                    <a th:href="@{/record/{recordId}/edit(recordId=${record.id})}"
                       class="edit-btn">
                        수정
                    </a>

                    <form th:action="@{/record/{recordId}/delete(recordId=${record.id})}"
                          method="post"
                          onsubmit="return confirm('데이트 기록을 삭제하시겠습니까?');">

                        <button type="submit" class="delete-btn">
                            삭제
                        </button>

                    </form>
                </div>
            </div>
        </section>
    </main>

    <script th:src="@{/js/record/detail.js}"></script>
</body>
</html>
