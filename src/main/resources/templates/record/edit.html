<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>데이트 기록 수정</title>

    <link rel="stylesheet" th:href="@{/css/record/edit.css}">
</head>
<body>

    <header class="header">
        <div class="logo">Two-Gether</div>

        <nav class="nav">
            <a th:href="@{/couple}">홈</a>
            <a th:href="@{/calendar}">캘린더</a>
            <a th:href="@{/record}" class="active">기록</a>
            <a th:href="@{/expense}">비용</a>
            <a th:href="@{/statistics}">통계</a>
        </nav>

        <div class="profile">
            <a th:href="@{/mypage}" class="profile-link">
                <span class="nickname">
                    <span th:text="${member.name}">현선</span> 님
                </span>

                <img th:src="@{/images/default-profile.png}" alt="프로필 이미지">
            </a>
        </div>
    </header>

    <main class="record-create-page">

        <div class="back-area">
            <a th:href="@{/record/{recordId}(recordId=${record.id})}" class="back-link">
                ← 상세로
            </a>
        </div>

        <form th:action="@{/record/{recordId}/edit(recordId=${record.id})}"
              method="post"
              enctype="multipart/form-data"
              class="record-create-form">

            <section class="photo-section">

                <label for="images" class="main-upload-box">

                    <img id="mainPreview"
                         class="main-preview"
                         th:src="${!#lists.isEmpty(record.images) ? record.images.get(0).imageUrl : ''}"
                         alt="대표 사진 미리보기">

                    <span th:if="${#lists.isEmpty(record.images)}"
                          class="upload-plus"
                          id="uploadPlus">+</span>

                    <span th:if="${#lists.isEmpty(record.images)}"
                          class="upload-text"
                          id="uploadText">사진 변경</span>

                </label>

                <input type="file"
                       id="images"
                       name="images"
                       accept="image/*"
                       multiple
                       hidden>

                <div class="thumbnail-list">

                    <div th:each="image : ${record.images}"
                         class="thumbnail-item">

                        <img th:src="${image.imageUrl}" alt="기존 사진">

                        <label class="delete-check">
                            <input type="checkbox"
                                   name="deleteImageIds"
                                   th:value="${image.id}">
                            삭제
                        </label>

                    </div>

                </div>

                <div class="new-image-preview-area">
                    <p class="preview-title">새로 추가할 사진</p>
                    <div class="thumbnail-list" id="thumbnailList"></div>
                </div>

            </section>

            <section class="info-section">

                <h1 class="page-title">데이트 기록 수정</h1>

                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text"
                           id="title"
                           name="title"
                           th:value="${record.title}">
                </div>

                <div class="form-group">
                    <label for="dateRecordDate">날짜</label>
                    <input type="date"
                           id="dateRecordDate"
                           name="dateRecordDate"
                           th:value="${record.dateRecordDate}">
                </div>

                <div class="form-group">
                    <label for="memo">메모</label>
                    <textarea id="memo"
                              name="memo"
                              th:text="${record.memo}"></textarea>
                </div>

                <div class="button-area">
                    <a th:href="@{/record/{recordId}(recordId=${record.id})}" class="cancel-btn">
                        취소
                    </a>
                    <button type="submit" class="submit-btn">
                        수정하기
                    </button>
                </div>

            </section>

        </form>

    </main>

    <script th:src="@{/js/record/edit.js}"></script>
</body>
</html>
