<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <meta charset="UTF-8">
    <title>소비 통계</title>
    <link rel="stylesheet" th:href="@{/css/statistics/statistics.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:src="@{/js/statistics/statistics.js}" defer></script>
</head>
<body>
    <th:block layout:fragment="content">
        <section class="statistics-container">
            <div class="page-header">
                <div>
                    <h1>소비 통계</h1>
                    <p>이번 한 달 소비 패턴을 확인할 수 있습니다! 부자가 됩시다~</p>
                </div>
                <a th:href="@{/transaction}" class="transaction-link">월별 거래 보러가기</a>
            </div>

            <div class="summary">
                <div class="summary-income">
                    <p>총 수입</p>
                    <strong th:text="${#numbers.formatInteger(statistics.totalExpense, 3, 'COMMA')} + '원'">0원</strong>
                </div>

                <div class="summary-balance">
                    <p>잔액</p>
                    <strong th:text="${#numbers.formatInteger(statistics.balance, 3, 'COMMA')} + '원'">0원</strong>
                </div>
            </div>

            <div class="chart-section">
                <div class="chart">
                    <div class="category-chart">
                        <h2>카테고리별 소비</h2>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <div class="chart">
                    <div class="expense-chart">
                        <h2>월별 소비</h2>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <script th:inline="javascript">
            const categoryExpenses = /*[[${statistics.categoryExpenses}]]*/ [];
            const monthlyExpenses = /*[[${statistics.monthlyExpenses}]]*/ [];
        </script>

    </th:block>
</body>
</html>
