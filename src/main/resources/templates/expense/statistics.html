<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비용 통계 페이지</title>

    <link rel="stylesheet" th:href="@{/css/expense/statistics.css}">
</head>
<body>
    <header class="header">
        <div class="logo">Two-Gether</div>

        <nav class="nav">
            <a th:href="@{/couple}">홈</a>
            <a th:href="@{/calendar}">캘린더</a>
            <a th:href="@{/record}">기록</a>
            <a th:href="@{/expense}" class="active">비용</a>
            <a th:href="@{/statistics}">통계</a>
        </nav>

        <div class="profile">
            <a th:href="@{/mypage}" class="profile-link">
                <span class="nickname">
                    <span th:text="${member.name}">현선</span> 님
                </span>
                <img th:src="@{/images/default-profile.png}" alt="프로필 이미지">
            </a>
        </div>
    </header>

    <main class="statistics-container">

        <div class="page-header">
            <div>
                <a th:href="@{/expense}" class="back-link">← 비용 관리로</a>
                <h1>지출 통계</h1>
                <p>월별 지출과 카테고리별 소비 흐름을 확인해보세요.</p>
            </div>
        </div>

        <form th:action="@{/expense/statistics}" method="get" class="filter-form">

            <select name="year">
                <option th:value="${selectedYear}" th:text="${selectedYear} + '년'">2026년</option>
                <option value="2026">2026년</option>
                <option value="2025">2025년</option>
            </select>

            <select name="month">
                <option th:each="m : ${#numbers.sequence(1, 12)}"
                        th:value="${m}"
                        th:selected="${m == selectedMonth}"
                        th:text="${m} + '월'">
                    6월
                </option>
            </select>

            <select name="category">
                <option value="ALL" th:selected="${selectedCategory == 'ALL'}">전체</option>
                <option value="DATE" th:selected="${selectedCategory == 'DATE'}">데이트</option>
                <option value="FOOD" th:selected="${selectedCategory == 'FOOD'}">식비</option>
                <option value="CAFE" th:selected="${selectedCategory == 'CAFE'}">카페</option>
                <option value="GIFT" th:selected="${selectedCategory == 'GIFT'}">선물</option>
                <option value="TRAVEL" th:selected="${selectedCategory == 'TRAVEL'}">여행</option>
                <option value="ETC" th:selected="${selectedCategory == 'ETC'}">기타</option>
            </select>

            <button type="submit">조회</button>
        </form>

        <section class="summary-section">

            <div class="summary-card">
                <span>선택 월 총 지출</span>
                <strong th:text="${#numbers.formatInteger(statistics.totalAmount, 1, 'COMMA')} + '원'">
                    36,900원
                </strong>
            </div>

            <div class="summary-card">
                <span>선택 월 평균 지출</span>
                <strong th:text="${#numbers.formatInteger(statistics.averageAmount, 1, 'COMMA')} + '원'">
                    9,225원
                </strong>
            </div>

        </section>

        <section class="chart-section">
            <div class="chart-card">
                <div class="chart-header">
                    <h2>월별 지출 추이</h2>
                    <span>최근 6개월 기준</span>
                </div>

                <div class="bar-chart">
                    <div class="bar-item"
                         th:each="month : ${statistics.monthlyStatistics}">

                        <strong th:text="${#numbers.formatInteger(month.amount, 1, 'COMMA')} + '원'">
                            30,000원
                        </strong>

                        <div class="bar-wrap">
                            <div class="bar"
                                 th:style="'height:' + ${month.heightPercent} + '%'">
                            </div>
                        </div>

                        <span th:text="${month.monthLabel}">6월</span>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-header">
                    <h2>카테고리별 지출</h2>
                    <span th:text="${selectedMonth} + '월 기준'">6월 기준</span>
                </div>

                <div class="category-chart">
                    <div class="category-row"
                         th:each="category : ${statistics.categoryStatistics}">

                    <span class="category-name" th:text="${category.categoryName}">
                        식비
                    </span>

                        <div class="category-bar-wrap">
                            <div class="category-bar"
                                 th:style="'width:' + ${category.heightPercent} + '%'">
                            </div>
                        </div>

                        <strong th:text="${#numbers.formatInteger(category.amount, 1, 'COMMA')} + '원'">
                            20,000원
                        </strong>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
