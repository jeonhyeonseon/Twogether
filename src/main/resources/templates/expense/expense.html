<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expense Page</title>
  <link rel="stylesheet" th:href="@{/css/expense/expense.css}">
</head>
<body>

    <header class="header">
        <div class="logo">Two-Gether</div>

        <nav class="nav">
            <a th:href="@{/couple}">홈</a>
            <a th:href="@{/calendar}">캘린더</a>
            <a th:href="@{/record}">기록</a>
            <a th:href="@{/expense}">비용</a>
            <a th:href="@{/statistics}">통계</a>
        </nav>

        <div class="profile">
            <a th:href="@{/mypage}" class="profile-link">
                <span class="nickname">
                    <span th:text="${member.name}">현선</span> 님
                </span>
                <img th:src="@{/images/default-profile.png}" alt="프로필 이미지">
            </a>
        </div>
    </header>

    <div class="expense-container">
        <div class="expense-header">
            <h1>비용 관리</h1>

            <button type="button"
                    class="add-btn"
                    onclick="openCreateModal()">
                비용 추가
            </button>
        </div>

        <div class="summary-section">

            <div class="summary-card">
                <span>총 지출</span>
                <strong th:text="${#numbers.formatInteger(totalAmount, 3, 'COMMA')} + '원'">
                    182,000원
                </strong>
            </div>

            <div class="summary-card">
                <span>데이트 횟수</span>
                <strong th:text="${dateCount} + '회'">
                    4회
                </strong>
            </div>

            <div class="summary-card">
                <span>평균 지출</span>
                <strong th:text="${#numbers.formatInteger(averageAmount, 3, 'COMMA')} + '원'">
                    45,500원
                </strong>
            </div>
        </div>

        <div class="filter-section">

            <form th:action="@{/expense}" method="get">
                <input type="hidden" name="category" value="ALL">
                <button type="submit"
                        class="category"
                        th:classappend="${selectedCategory == 'ALL'} ? ' active'">
                    전체
                </button>
            </form>

            <form th:action="@{/expense}" method="get">
                <input type="hidden" name="category" value="DATE">
                <button type="submit"
                        class="category"
                        th:classappend="${selectedCategory == 'DATE'} ? ' active'">
                    데이트
                </button>
            </form>

            <form th:action="@{/expense}" method="get">
                <input type="hidden" name="category" value="FOOD">
                <button type="submit"
                        class="category"
                        th:classappend="${selectedCategory == 'FOOD'} ? ' active'">
                    식비
                </button>
            </form>

            <form th:action="@{/expense}" method="get">
                <input type="hidden" name="category" value="CAFE">
                <button type="submit"
                        class="category"
                        th:classappend="${selectedCategory == 'CAFE'} ? ' active'">
                    카페
                </button>
            </form>

            <form th:action="@{/expense}" method="get">
                <input type="hidden" name="category" value="GIFT">
                <button type="submit"
                        class="category"
                        th:classappend="${selectedCategory == 'GIFT'} ? ' active'">
                    선물
                </button>
            </form>

            <form th:action="@{/expense}" method="get">
                <input type="hidden" name="category" value="TRAVEL">
                <button type="submit"
                        class="category"
                        th:classappend="${selectedCategory == 'TRAVEL'} ? ' active'">
                    여행
                </button>
            </form>

            <form th:action="@{/expense}" method="get">
                <input type="hidden" name="category" value="ETC">
                <button type="submit"
                        class="category"
                        th:classappend="${selectedCategory == 'ETC'} ? ' active'">
                    기타
                </button>
            </form>

        </div>

        <div class="empty-message"
             th:if="${#lists.isEmpty(expenseResponseDto)}">
            등록된 비용이 없습니다.
        </div>

        <div class="expense-list">
            <div class="expense-item"
                 th:each="expense : ${expenseResponseDto}"
                 th:data-id="${expense.id}"
                 th:data-date="${expense.expenseDate}"
                 th:data-content="${expense.content}"
                 th:data-category="${expense.categoryName}"
                 th:data-category-display="${expense.categoryDisplayName}"
                 th:data-amount="${expense.amount}"
                 th:data-paid-by="${expense.paidByName}"
                 th:data-memo="${expense.memo}"
                 onclick="openDetailModal(this)">

                <div class="expense-info">
                    <h3 th:text="${expense.content}">영화 관람</h3>

                    <p>
                        <span th:text="${expense.categoryDisplayName}">데이트</span>
                        ·
                        <span th:text="${#temporals.format(expense.expenseDate, 'yyyy.MM.dd')}">
                    2026.06.18
                </span>
                    </p>
                </div>

                <div class="expense-payment">
                    <span th:text="${expense.paidByName}">현선</span>

                    <strong th:text="${#numbers.formatInteger(expense.amount, 3, 'COMMA')} + '원'">
                        30,000원
                    </strong>
                </div>
            </div>
        </div>
    </div>

    <div id="expenseModal" class="modal">
        <div class="modal-content">

            <div class="modal-header">
                <h2 id="modalTitle">비용 등록</h2>

                <button type="button"
                        class="modal-close"
                        onclick="closeExpenseModal()">
                    ×
                </button>
            </div>

            <form id="expenseForm"
                  th:action="@{/expense}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="form-group">
                    <label>날짜</label>
                    <input type="date"
                           id="expenseDate"
                           name="expenseDate"
                           required>
                </div>

                <div class="form-group">
                    <label>내용</label>
                    <input type="text"
                           id="content"
                           name="content"
                           required>
                </div>

                <div class="form-group">
                    <label>카테고리</label>
                    <select id="category"
                            name="category"
                            required>
                        <option value="">선택</option>
                        <option value="DATE">데이트</option>
                        <option value="FOOD">식비</option>
                        <option value="CAFE">카페</option>
                        <option value="GIFT">선물</option>
                        <option value="TRAVEL">여행</option>
                        <option value="ETC">기타</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>금액</label>
                    <input type="number"
                           id="amount"
                           name="amount"
                           min="0"
                           required>
                </div>

                <div class="form-group">
                    <label>메모</label>
                    <textarea id="memo"
                              name="memo"></textarea>
                </div>

                <button type="submit"
                        id="submitBtn"
                        class="submit-btn">
                    등록하기
                </button>
            </form>
        </div>
    </div>

    <div id="expenseDetailModal" class="modal">
        <div class="modal-content detail-modal-content">

            <div class="modal-header">
                <h2 id="detailTitle">비용 상세</h2>

                <button type="button"
                        class="modal-close"
                        onclick="closeDetailModal()">
                    ×
                </button>
            </div>

            <div id="detailViewArea">

                <div class="detail-row">
                    <span>날짜</span>
                    <strong id="detailDate"></strong>
                </div>

                <div class="detail-row">
                    <span>카테고리</span>
                    <strong id="detailCategory"></strong>
                </div>

                <div class="detail-row">
                    <span>결제자</span>
                    <strong id="detailPaidBy"></strong>
                </div>

                <div class="detail-row">
                    <span>금액</span>
                    <strong id="detailAmount"></strong>
                </div>

                <div class="detail-memo">
                    <span>메모</span>
                    <p id="detailMemo">등록된 메모가 없습니다.</p>
                </div>

                <div class="detail-actions">
                    <button type="button"
                            class="edit-btn"
                            onclick="switchToEditMode()">
                        수정
                    </button>

                    <form id="deleteForm"
                          method="post"
                          onsubmit="return confirmDelete()">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <button type="submit" class="delete-btn">
                            삭제
                        </button>
                    </form>
                </div>

            </div>

            <form id="detailEditForm"
                  method="post"
                  class="detail-edit-form hidden">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="form-group">
                    <label>날짜</label>
                    <input type="date"
                           id="editExpenseDate"
                           name="expenseDate"
                           required>
                </div>

                <div class="form-group">
                    <label>내용</label>
                    <input type="text"
                           id="editContent"
                           name="content"
                           required>
                </div>

                <div class="form-group">
                    <label>카테고리</label>
                    <select id="editCategory"
                            name="category"
                            required>
                        <option value="DATE">데이트</option>
                        <option value="FOOD">식비</option>
                        <option value="CAFE">카페</option>
                        <option value="GIFT">선물</option>
                        <option value="TRAVEL">여행</option>
                        <option value="ETC">기타</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>금액</label>
                    <input type="number"
                           id="editAmount"
                           name="amount"
                           min="0"
                           required>
                </div>

                <div class="form-group">
                    <label>메모</label>
                    <textarea id="editMemo"
                              name="memo"></textarea>
                </div>

                <div class="detail-actions">
                    <button type="button"
                            class="cancel-btn"
                            onclick="switchToViewMode()">
                        취소
                    </button>

                    <button type="submit"
                            class="submit-btn">
                        수정 완료
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/expense/expense.js}"></script>
</body>
</html>
